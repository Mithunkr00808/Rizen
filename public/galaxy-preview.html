<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Galaxy Preview</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- Native ES Module Import Map for Three.js and Addons -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Setup dimensions
    const width = window.innerWidth;
    const height = window.innerHeight;

    const scene = new THREE.Scene()
    scene.background = new THREE.Color(0x000008)
    const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 150)
    camera.position.set(0, 10, 15) // Adjusted camera slightly closer to match the new smaller radius
    camera.lookAt(0, 0, 0)
    
    const renderer = new THREE.WebGLRenderer({ antialias: true })
    renderer.setSize(width, height)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    document.querySelector('#app').appendChild(renderer.domElement)

    // Setup interactive controls
    const controls = new OrbitControls(camera, renderer.domElement)
    controls.enableDamping = true // Adds smooth friction when rotating
    controls.dampingFactor = 0.05

    // Galaxy generation
    const galaxyGeometry = new THREE.BufferGeometry()
    const count = 50000
    const positions = new Float32Array(count * 3)
    const colors = new Float32Array(count * 3)

    const colorInside = new THREE.Color(0xff6030)
    const colorOutside = new THREE.Color(0x1b3984)

    for (let i = 0; i < count; i++) {
      const i3 = i * 3
      const radius = Math.random() * 7 // Reduced from 15 to tighten the galaxy
      const spinAngle = radius * 1.2
      const branchAngle = (i % 4) / 4 * Math.PI * 2

      // Scatter the particles to create a volumetric dust cloud effect
      const randomness = 0.8
      const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * randomness * radius
      const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * randomness * radius
      const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * randomness * radius

      positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX
      positions[i3 + 1] = randomY
      positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ

      const mixedColor = colorInside.clone()
      mixedColor.lerp(colorOutside, radius / 7) // Adjusted to match the new radius boundary
      colors[i3] = mixedColor.r
      colors[i3 + 1] = mixedColor.g
      colors[i3 + 2] = mixedColor.b
    }

    galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3))
    galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3))

    const galaxyMaterial = new THREE.PointsMaterial({
      size: 0.05, // Slightly increased from 0.01 so it's easily visible on HD screens
      sizeAttenuation: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    })

    const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial)
    scene.add(galaxy)

    function animate() {
      requestAnimationFrame(animate)
      galaxy.rotation.y += 0.001
      controls.update() // Required for damping to work
      renderer.render(scene, camera)
    }
    animate()

    // Handle Window Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
